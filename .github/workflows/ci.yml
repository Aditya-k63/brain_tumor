name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-fastapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push FastAPI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          no-cache: true
          tags: |
            adsharma14/brain-tumor:latest
            adsharma14/brain-tumor:${{ github.sha }}
          cache-from: type=gha,scope=fastapi
          cache-to: type=gha,scope=fastapi,mode=max

  build-streamlit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Streamlit
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.streamlit
          push: true
          tags: |
            adsharma14/brain-tumor-streamlit:latest
            adsharma14/brain-tumor-streamlit:${{ github.sha }}
          cache-from: type=gha,scope=streamlit
          cache-to: type=gha,scope=streamlit,mode=max